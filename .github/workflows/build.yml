name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04 # กลับมาใช้ 22.04 เพื่อความเสถียรของ libtinfo5/6
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libjpeg-dev
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: |
          # ล้างสิทธิ์การเข้าถึงให้ถูกต้อง
          sudo chown -R runner:docker .
          # คำสั่งล้าง Cache เพื่อให้ Buildozer รับรู้ว่าไฟล์ย้ายไปอยู่ใน /icons แล้ว
          buildozer android clean
          # เริ่ม Build ใหม่แบบล้างไพ่
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GoPDF-APK
          path: bin/*.apk
